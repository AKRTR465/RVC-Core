base_config: base.yaml
name: mute

# Keep root directories explicit. Derived directories and default output
# filenames come from resolver defaults based on name/data_root/work_dir.
work_dir: ckpt/mute
data_root: data
ckpt_root: ckpt
pretrain_root: pretrain

selectors:
  version: v1
  sample_rate: 48k
  if_f0: 1

model:
  spk_embed_dim: 109

variants:
  v1:
    32k:
      train:
        segment_size: 12800
      data:
        sampling_rate: 32000
        filter_length: 1024
        hop_length: 320
        win_length: 1024
        n_mel_channels: 80
      model:
        upsample_rates: [10, 4, 2, 2, 2]
        upsample_kernel_sizes: [16, 16, 4, 4, 4]
    40k:
      train:
        segment_size: 12800
      data:
        sampling_rate: 40000
        filter_length: 2048
        hop_length: 400
        win_length: 2048
        n_mel_channels: 125
      model:
        upsample_rates: [10, 10, 2, 2]
        upsample_kernel_sizes: [16, 16, 4, 4]
    48k:
      train:
        segment_size: 11520
      data:
        sampling_rate: 48000
        filter_length: 2048
        hop_length: 480
        win_length: 2048
        n_mel_channels: 128
      model:
        upsample_rates: [10, 6, 2, 2, 2]
        upsample_kernel_sizes: [16, 16, 4, 4, 4]
  v2:
    32k:
      train:
        segment_size: 12800
      data:
        sampling_rate: 32000
        filter_length: 1024
        hop_length: 320
        win_length: 1024
        n_mel_channels: 80
      model:
        upsample_rates: [10, 8, 2, 2]
        upsample_kernel_sizes: [20, 16, 4, 4]
    48k:
      train:
        segment_size: 17280
      data:
        sampling_rate: 48000
        filter_length: 2048
        hop_length: 480
        win_length: 2048
        n_mel_channels: 128
      model:
        upsample_rates: [12, 10, 2, 2]
        upsample_kernel_sizes: [24, 20, 4, 4]
