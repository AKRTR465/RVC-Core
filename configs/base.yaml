preprocess:
  noparallel: false

runtime:
  device: auto
  is_half: auto
  n_cpu: auto
  slice:
    x_pad: auto
    x_query: auto
    x_center: auto
    x_max: auto

infer:
  model_path: auto
  index_path: auto
  f0method: rmvpe
  pitch: 12.0
  index_rate: 0.0
  block_time: 0.15
  crossfade_length: 0.08
  extra_time: 2.0
  rms_mix_rate: 0.5
  formant: 0.0
  use_pv: false

train:
  fp16_run: auto
  save_every_epoch: 10
  save_every_weights: false
  if_latest: 0
  if_cache_data_in_gpu: 0
  pretrainG: ""
  pretrainD: ""
  log_interval: 200
  seed: 1234
  epochs: 20000
  learning_rate: 1.0e-4
  betas: [0.8, 0.99]
  eps: 1.0e-9
  batch_size: 4
  lr_decay: 0.999875
  c_mel: 45
  c_kl: 1.0

data:
  mel_fmin: 0.0
  mel_fmax: null

model:
  inter_channels: 192
  hidden_channels: 192
  filter_channels: 768
  n_heads: 2
  n_layers: 6
  kernel_size: 3
  p_dropout: 0
  resblock: "1"
  resblock_kernel_sizes: [3, 7, 11]
  resblock_dilation_sizes: [[1, 3, 5], [1, 3, 5], [1, 3, 5]]
  upsample_initial_channel: 512
  use_spectral_norm: false
  gin_channels: 256
